<html lang="it">
<head>
<link rel="manifest" href="/manifesto.json">

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Fireworks - Audio Fixed</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #01020a; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #signature {
            position: absolute; bottom: 15px; left: 15px;
            font-family: 'Arial', sans-serif;
            font-size: 13px; font-weight: bold;
            color: #ff8c00; text-decoration: none; 
            opacity: 0.5; transition: opacity 0.3s;
            z-index: 10;
        }
        #signature:hover { opacity: 1; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <a id="signature" href="mailto:allsatone@gmail.com?subject=App.%20Fireworks">@Walter</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // --- MOTORE AUDIO POTENZIATO CONTRO SATURAZIONE ---
        const masterGain = audioCtx.createGain();
        const limiter = audioCtx.createDynamicsCompressor();
        
        masterGain.gain.setValueAtTime(0.4, audioCtx.currentTime); // Gain ridotto per headroom
        
        limiter.threshold.setValueAtTime(-6, audioCtx.currentTime); // Limite più basso
        limiter.knee.setValueAtTime(30, audioCtx.currentTime);
        limiter.ratio.setValueAtTime(20, audioCtx.currentTime); // Compressione più aggressiva
        limiter.attack.setValueAtTime(0.003, audioCtx.currentTime);
        limiter.release.setValueAtTime(0.25, audioCtx.currentTime);
        
        masterGain.connect(limiter);
        limiter.connect(audioCtx.destination);

        let width, height;
        let isWhirlActive = false; 

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function playLaunchSound(isFinal = false) {
            if (audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isFinal ? 40 : 60, audioCtx.currentTime); 
            gain.gain.setValueAtTime(isFinal ? 0.3 : 0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(masterGain);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function playNaturalSizzle() {
            if (audioCtx.state === 'suspended') return;
            const duration = 0.6;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(3000, audioCtx.currentTime);
            filter.Q.setValueAtTime(5, audioCtx.currentTime);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            noise.connect(filter); filter.connect(gain); gain.connect(masterGain);
            noise.start();
        }

        function playExplosionSound(intensity) {
            if (audioCtx.state === 'suspended') return;
            const bufferSize = audioCtx.sampleRate * 2.0;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600 * intensity, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1.2);
            gain.gain.setValueAtTime(intensity * 0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            noise.connect(filter); filter.connect(gain); gain.connect(masterGain);
            noise.start();
        }

        // --- LOGICA PARTICELLE (Grafica Invariata) ---
        class Particle {
            constructor(x, y, color, vel, friction = 0.97, gravity = 0.08, strobe = false, decayMult = 1, whirl = false) {
                this.x = x; this.y = y; this.color = whirl ? "#ffffff" : color;
                this.vel = vel;
                this.alpha = 1;
                this.decay = (0.006 + (Math.random() * 0.01)) * (whirl ? 0.45 : decayMult);
                this.friction = friction;
                this.gravity = gravity;
                this.strobe = strobe;
                this.whirl = whirl;
                this.delay = whirl ? Math.random() * 80 : 0;
                this.activated = false;
                
                this.angle = Math.random() * Math.PI * 2;
                this.baseRotationSpeed = (0.1 + Math.random() * 0.3) * (Math.random() > 0.5 ? 1 : -1);
                this.rotationSpeed = this.baseRotationSpeed;
                this.whirlRadius = 1; 
                this.baseWhirlExpansion = 0.5 + Math.random() * 2.5;
                this.whirlExpansion = this.baseWhirlExpansion;

                this.flashAlpha = 0; 
                this.radius = whirl ? 0.8 : 1.4;
            }

            draw() {
                if (this.delay > 0 || this.alpha <= 0.02) return;
                if (this.flashAlpha > 0) {
                    ctx.save(); ctx.globalAlpha = this.flashAlpha; ctx.fillStyle = "#ffffff";
                    ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.restore(); this.flashAlpha -= 0.4; 
                }
                if (this.strobe && Math.random() > 0.6 && this.alpha > 0.2) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5; 
                ctx.shadowColor = this.color;
                ctx.beginPath();
                const r = this.radius * (this.whirl ? (0.7 + this.alpha * 0.3) : 1);
                ctx.arc(this.x, this.y, Math.max(0.1, r), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            update() {
                if (this.delay > 0) {
                    this.x += this.vel.x * 0.3; this.y += this.vel.y * 0.3;
                    this.delay--; return;
                }
                if (this.whirl && !this.activated) {
                    playNaturalSizzle(); this.flashAlpha = 0.8; this.activated = true;
                }
                if (this.whirl) {
                    this.rotationSpeed = this.baseRotationSpeed * (1 + (Math.random() - 0.5) * 0.6);
                    this.angle += this.rotationSpeed;
                    this.whirlExpansion *= (0.96 + Math.random() * 0.08); 
                    this.whirlRadius += this.whirlExpansion; 
                    this.vel.x += (Math.random() - 0.5) * 0.4;
                    this.vel.y += (Math.random() - 0.5) * 0.4;
                    this.x += Math.cos(this.angle) * (this.whirlRadius * 0.16) + this.vel.x;
                    this.y += Math.sin(this.angle) * (this.whirlRadius * 0.16) + this.vel.y;
                    this.vel.x *= this.friction; this.vel.y *= this.friction;
                    this.y += this.gravity * 0.03;
                    if(this.whirlRadius > 60) this.alpha -= 0.03;
                } else {
                    this.vel.x *= this.friction; this.vel.y *= this.friction;
                    this.vel.y += this.gravity;
                    this.x += this.vel.x; this.y += this.vel.y;
                }
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor(tx, ty, isSubShot = false, customHue = null, isFinal = false, forceEffect = null) {
                this.x = isSubShot ? tx : Math.random() * (width * 0.8) + (width * 0.1);
                this.y = height;
                this.tx = tx; this.ty = ty;
                this.isFinal = isFinal;
                this.forceEffect = forceEffect;
                this.hue = customHue !== null ? customHue : Math.floor(Math.random() * 360);
                const angle = Math.atan2(ty - height, tx - this.x);
                const dist = Math.sqrt(Math.pow(tx - this.x, 2) + Math.pow(ty - height, 2));
                const speed = Math.min(dist / 40, 22);
                this.v = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
                this.dead = false;
                this.particles = [];
                if(!isSubShot) playLaunchSound(isFinal);
            }

            update() {
                this.x += this.v.x; this.y += this.v.y;
                ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2); ctx.fill();
                if (this.v.y >= 0 || this.y <= this.ty) { this.explode(); this.dead = true; }
                this.v.y += 0.12; 
            }

            explode() {
                const effects = [
                    'peony', 'peony', 'peony', 'chrysanthemum', 'chrysanthemum', 'willow', 'willow',
                    'brocade', 'palm', 'crossette', 'dahlia', 'spider', 'strobe', 'strobe',
                    'fish', 'waterfall', 'pistil', 'whirl'
                ];
                const effectType = this.forceEffect || (this.isFinal ? 'brocade' : effects[Math.floor(Math.random() * effects.length)]);
                
                if (effectType === 'whirl' && !this.forceEffect) {
                    isWhirlActive = true; 
                    const spawnWhirls = (count) => {
                        if (count < 8) { 
                            setTimeout(() => {
                                fireworks.push(new Firework(
                                    (width * 0.15) + Math.random() * (width * 0.7), 
                                    (height * 0.1) + Math.random() * (height * 0.35), 
                                    true, this.hue, false, 'whirl'
                                ));
                                spawnWhirls(count + 1);
                            }, 650 + Math.random() * 300); 
                        } else {
                            setTimeout(() => { isWhirlActive = false; }, 3000);
                        }
                    };
                    spawnWhirls(1); 
                }

                const count = this.isFinal ? 400 : 180 + Math.random() * 100;
                playExplosionSound(this.isFinal ? 1.6 : 0.6 + Math.random() * 0.3);

                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 5 + 1; 
                    if(this.isFinal) speed = Math.random() * 12 + 2;
                    let friction = 0.96, gravity = 0.07, strobe = false, decayMult = 1, whirl = false;
                    let hue = this.hue, brightness = 65;

                    switch(effectType) {
                        case 'whirl': whirl = true; speed = Math.random() * 3 + 4; decayMult = 0.5; break;
                        case 'willow': gravity = 0.02; friction = 0.985; hue = 45; decayMult = 0.5; break; 
                        case 'brocade': hue = 40; brightness = 80; friction = 0.985; gravity = 0.03; break;
                        case 'palm': if (i % 20 === 0) speed = 8; else speed = Math.random() * 3.5; break; 
                        case 'crossette': speed = i % 8 === 0 ? 7 : 2; break; 
                        case 'strobe': strobe = true; break; 
                        case 'waterfall': gravity = 0.22; friction = 0.99; decayMult = 0.6; break; 
                        case 'pistil': if (i < 60) { hue = (this.hue + 180) % 360; speed = 2; } break; 
                    }

                    let color = `hsl(${hue}, 100%, ${brightness}%)`;
                    this.particles.push(new Particle(this.x, this.y, color, {
                        x: Math.cos(angle) * speed, y: Math.sin(angle) * speed
                    }, friction, gravity, strobe, decayMult, whirl));
                }
            }
        }

        let fireworks = [], particles = [];

        function triggerFormat(type, x, y) {
            if (isWhirlActive) return; 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            switch(type) {
                case 'final_explosion': 
                    fireworks.push(new Firework(x, y, false, Math.floor(Math.random() * 360), true)); 
                    break;
                case 'battery': 
                    let shots = 16; let batteryHue = Math.random() * 360;
                    let bInt = setInterval(() => {
                        if (isWhirlActive) return; 
                        let targetX = (width * 0.2) + (Math.random() * width * 0.6);
                        let targetY = (height * 0.1) + (Math.random() * height * 0.3);
                        fireworks.push(new Firework(targetX, targetY, false, batteryHue));
                        if (--shots <= 0) clearInterval(bInt);
                    }, 180);
                    break;
                case 'roman_candle': 
                    let rShots = 8;
                    let rInt = setInterval(() => {
                        if (isWhirlActive) return;
                        fireworks.push(new Firework(x + (Math.random()-0.5)*100, y, true));
                        if (--rShots <= 0) clearInterval(rInt);
                    }, 300);
                    break;
                case 'fountain': 
                    for(let i=0; i<80; i++) {
                        setTimeout(() => {
                            if (isWhirlActive) return;
                            particles.push(new Particle(x, height, '#ffcc00', {x:(Math.random()-0.5)*4, y:-Math.random()*15 - 5}, 0.98, 0.25, false, 1.8));
                        }, i*40);
                    }
                    break;
                case 'mine': 
                    playExplosionSound(1.3);
                    for(let i=0; i<120; i++) {
                        particles.push(new Particle(x, height, `hsl(${Math.random()*360},100%,60%)`, {x:(Math.random()-0.5)*20, y:-Math.random()*28 - 10}, 0.94, 0.25));
                    }
                    break;
                default: fireworks.push(new Firework(x, y));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(1, 2, 10, 0.25)'; 
            ctx.fillRect(0, 0, width, height);
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                if (fireworks[i].dead) { particles.push(...fireworks[i].particles); fireworks.splice(i, 1); }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }

        function handleInput(x, y) {
            if (isWhirlActive) return;
            const formats = ['shell', 'shell', 'shell', 'battery', 'mine', 'fountain', 'roman_candle', 'final_explosion'];
            triggerFormat(formats[Math.floor(Math.random() * formats.length)], x, y);
        }

        canvas.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        animate();
    </script>
</body>
