<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Long-Range Fireworks - Max Launch Sound</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010206; }
        canvas { display: block; cursor: crosshair; }
        #signature {
            position: absolute; bottom: 15px; left: 15px;
            font-family: 'Arial', sans-serif;
            font-size: 11px; font-weight: bold;
            color: #ff8c00; text-decoration: none; 
            opacity: 0.4; transition: opacity 0.3s;
            z-index: 10; letter-spacing: 1px;
        }
        #signature:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <a id="signature" href="mailto:allsatone@gmail.com?subject=App.%20Fireworks">@Walter</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- AUDIO DI LANCIO MASSIMIZZATO ---
        function playLaunchSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(40, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            
            // Gain impostato su livelli molto alti per un impatto massimo
            gain.gain.setValueAtTime(1.5, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function playExplosionSound(intensity) {
            const bufferSize = audioCtx.sampleRate * 2.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(250 * intensity, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 3.0);
            gain.gain.setValueAtTime(intensity * 1.5, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.5);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        class Particle {
            constructor(x, y, color, vel, friction, gravity, size, lifeMult = 1) {
                this.x = x; this.y = y; this.color = color;
                this.vel = vel;
                this.alpha = 1;
                this.decay = (0.0018 + Math.random() * 0.0038) / lifeMult; 
                this.friction = friction;
                this.gravity = gravity;
                this.size = size;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowBlur = 2; ctx.shadowColor = this.color;
                ctx.fill(); ctx.restore();
            }
            update() {
                this.vel.x *= this.friction; this.vel.y *= this.friction;
                this.vel.y += this.gravity;
                this.x += this.vel.x; this.y += this.vel.y;
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor(tx, ty, forcedType, depthScale) {
                this.depthScale = depthScale;
                this.x = width / 2 + (Math.random() - 0.5) * (width * 0.7);
                this.y = height;
                this.tx = tx; 
                this.ty = Math.max(ty, height * 0.25);
                
                const colors = ['#ffffff', '#ffd700', '#fff4e6', '#ff1493', '#00ff7f', '#00bfff', '#ff4500'];
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.atan2(this.ty - height, this.tx - this.x);
                this.v = { 
                    x: Math.cos(angle) * (9 * this.depthScale), 
                    y: Math.sin(angle) * (9 * this.depthScale) 
                };
                this.dead = false; this.particles = [];
                this.type = forcedType;
                playLaunchSound();
            }

            update() {
                this.x += this.v.x; this.y += this.v.y;
                ctx.fillStyle = this.colorBase;
                ctx.beginPath(); ctx.arc(this.x, this.y, 0.8 * this.depthScale, 0, Math.PI*2); ctx.fill();
                if (this.v.y >= -0.5 || this.y <= this.ty) { this.explode(); this.dead = true; }
                this.v.y += 0.08 * this.depthScale; 
            }

            explode() {
                const count = 130 + Math.random() * 70;
                playExplosionSound(1.4);

                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = (Math.random() * 3.5 + 0.5) * this.depthScale;
                    let friction = 0.96; 
                    let gravity = 0.045 * this.depthScale; 
                    let lifeMult = 1.2;
                    let color = this.colorBase;

                    switch(this.type) {
                        case 0: // Brocade
                            color = '#ffcc00'; speed *= 1.2; gravity *= 0.6; friction = 0.98; lifeMult = 2.2; break;
                        case 1: // Saturn
                            if (i > count * 0.7) { angle = (i / count) * Math.PI * 2; speed = 4 * this.depthScale; friction = 0.94; }
                            break;
                        case 2: // Crossette
                            speed = i % 5 === 0 ? 5 * this.depthScale : 1.5 * this.depthScale; break;
                        case 3: // Horse Tail
                            angle = Math.PI + (Math.random() - 0.5) * 0.8; speed = (Math.random() * 1.5 + 0.5) * this.depthScale;
                            gravity = 0.08 * this.depthScale; friction = 0.97; break;
                        case 4: // Peony
                            speed *= 1.4; break;
                        case 5: // Silver Fish
                            friction = 0.94; color = '#e0e0e0'; speed = (Math.random() * 2 + 2) * this.depthScale; break;
                        case 6: // Willow
                            color = 'white'; gravity *= 0.4; friction = 0.985; lifeMult = 2.5; break;
                        case 7: // Ghost
                            if (Math.sin(angle * 4) > 0) speed = 0.2; break;
                        case 8: // Palm
                            speed = (Math.random() * 5 + 1) * this.depthScale; friction = 0.92; gravity = 0.1 * this.depthScale; break;
                    }

                    this.particles.push(new Particle(this.x, this.y, color, {
                        x: Math.cos(angle) * speed, y: Math.sin(angle) * speed
                    }, friction, gravity, 0.55 * this.depthScale, lifeMult));
                }
            }
        }

        let fireworks = [];
        let particles = [];
        let currentSequenceType = null;
        let sequenceCount = 0;

        function launchSequence(ex, ey) {
            const depthScale = 0.7 + Math.random() * 0.5;
            if (sequenceCount <= 0) {
                currentSequenceType = Math.floor(Math.random() * 9);
                sequenceCount = Math.floor(Math.random() * 4) + 1;
            }

            for(let i=0; i < sequenceCount; i++) {
                setTimeout(() => {
                    fireworks.push(new Firework(
                        ex + (Math.random() - 0.5) * 200, 
                        ey + (Math.random() - 0.5) * 100, 
                        currentSequenceType,
                        depthScale
                    ));
                }, i * 350);
            }
            sequenceCount = 0;
        }

        function animate() {
            ctx.fillStyle = 'rgba(1, 2, 6, 0.22)';
            ctx.fillRect(0, 0, width, height);
            
            fireworks.forEach((f, i) => {
                f.update();
                if (f.dead) { particles.push(...f.particles); fireworks.splice(i, 1); }
            });

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.alpha <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousedown', (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            launchSequence(e.clientX, e.clientY);
        });

        animate();
    </script>
</body>
</html>
