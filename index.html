<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Fireworks PWA - Enhanced Visibility</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#010206">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010206; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #signature {
            position: absolute; bottom: 15px; left: 15px;
            font-family: 'Arial', sans-serif; font-size: 11px; font-weight: bold;
            color: #ff8c00; text-decoration: none; opacity: 0.3; z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <a id="signature" href="mailto:allsatone@gmail.com">@Walter</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- AUDIO (Mantenuto High Volume) ---
        function playLaunchSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(45, audioCtx.currentTime); 
            gain.gain.setValueAtTime(1.5, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        function playExplosionSound(intensity) {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(250 * intensity, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 2.5);
            gain.gain.setValueAtTime(intensity * 1.2, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        class Particle {
            constructor(x, y, color, vel, friction, gravity, size, lifeMult, isLaunch = false) {
                this.x = x; this.y = y; this.color = color;
                this.vel = vel; this.alpha = 1;
                this.isLaunch = isLaunch;
                
                // --- DECADIMENTO RALLENTATO (leggermente) ---
                this.decay = (isLaunch ? 0.01 : 0.003 + Math.random() * 0.005) / lifeMult; 
                this.friction = friction; this.gravity = gravity;
                // --- DIMENSIONE AUMENTATA ---
                this.size = size * (isLaunch ? 1 : 1.3); 
            }
            draw() {
                // --- AGGIUNTO shadowBlur PER BRILLANTEZZA ---
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                if (!this.isLaunch) {
                  ctx.shadowBlur = this.size * 3; // Effetto bagliore per esplosioni
                  ctx.shadowColor = this.color;
                } else {
                  // Leggerissima scia per il lancio
                  ctx.shadowBlur = 1; 
                  ctx.shadowColor = 'rgba(240, 240, 230, 0.5)';
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, 7);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.vel.x *= this.friction; this.vel.y *= this.friction;
                this.vel.y += this.gravity;
                this.x += this.vel.x; this.y += this.vel.y;
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor(tx, ty, type, depthScale) {
                this.depthScale = depthScale;
                this.x = width / 2 + (Math.random() - 0.5) * (width * 0.7);
                this.y = height;
                this.tx = tx; this.ty = Math.max(ty, height * 0.2);
                
                // --- COLORI PIÙ SATURI E LUMINOSI PER LE ESPLOSIONI ---
                const explosionColors = ['#FFD700', '#FF1493', '#00FF00', '#00BFFF', '#FF4500', '#FF0000'];
                this.colorBase = explosionColors[Math.floor(Math.random() * explosionColors.length)];
                
                // --- COLORE TRAIETTORIA BIANCO SPORCO ---
                this.colorLaunch = '#F5F5F0';
                
                const angle = Math.atan2(this.ty - height, this.tx - this.x);
                this.v = { x: Math.cos(angle) * (8 * depthScale), y: Math.sin(angle) * (8 * depthScale) };
                this.dead = false; this.type = type;
                
                playLaunchSound();
            }
            update() {
                this.x += this.v.x; this.y += this.v.y;
                
                // --- DISEGNO RAZZO CON COLORE TRAIETTORIA ---
                ctx.save();
                ctx.fillStyle = this.colorLaunch;
                ctx.shadowBlur = 2; // Leggero bagliore per il razzo
                ctx.shadowColor = 'rgba(240, 240, 230, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.2 * this.depthScale, 0, 7); // Razzo leggermente più grande
                ctx.fill();
                ctx.restore();

                // --- AGGIUNTA PARTICELLE SCIA ---
                if (Math.random() > 0.3) { // Crea particelle scia con probabilità
                  const vel = {
                    x: (Math.random() - 0.5) * 0.5,
                    y: (Math.random() - 0.5) * 0.5
                  };
                  particles.push(new Particle(this.x, this.y, this.colorLaunch, vel, 0.99, 0.01, 0.4 * this.depthScale, 1.0, true));
                }
                
                if (this.v.y >= -0.2 || this.y <= this.ty) { this.explode(); this.dead = true; }
                this.v.y += 0.06 * this.depthScale; 
            }
            explode() {
                const count = 120 + Math.random() * 60;
                playExplosionSound(1.4);
                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = (Math.random() * 3.5 + 0.5) * this.depthScale;
                    let friction = 0.96; let gravity = 0.04 * this.depthScale; let lifeMult = 1.0;
                    let color = this.colorBase;

                    switch(this.type) {
                        case 0: color = '#ffcc00'; speed *= 1.2; gravity *= 0.6; lifeMult = 1.8; break;
                        case 1: if (i > count * 0.7) speed = 4; break;
                        case 2: speed = i % 5 === 0 ? 5 : 1.5; break;
                        case 3: angle = Math.PI + (Math.random() - 0.5) * 0.8; gravity = 0.08; break;
                        case 4: speed *= 1.3; break;
                        case 5: color = '#e0e0e0'; speed = Math.random() * 3; break;
                        case 6: color = 'white'; gravity *= 0.4; lifeMult = 2; break;
                        case 7: speed *= 0.8; break;
                        case 8: speed = Math.random() * 5; gravity = 0.1; break;
                    }

                    particles.push(new Particle(this.x, this.y, color, {
                        x: Math.cos(angle) * speed, y: Math.sin(angle) * speed
                    }, friction, gravity, 0.6 * this.depthScale, lifeMult));
                }
            }
        }

        let particles = [];
        let fireworks = [];

        function launchBatch(ex, ey) {
            const depthScale = 0.7 + Math.random() * 0.5;
            const type = Math.floor(Math.random() * 9);
            const batchSize = Math.floor(Math.random() * 3) + 1;
            for(let i=0; i < batchSize; i++) {
                setTimeout(() => {
                    fireworks.push(new Firework(ex + (Math.random()-0.5)*150, ey + (Math.random()-0.5)*100, type, depthScale));
                }, i * 350);
            }
        }

        function animate() {
            // --- SCIA RIDOTTA PER MAGGIORE CHIAREZZA ---
            ctx.fillStyle = 'rgba(1, 2, 6, 0.20)'; 
            ctx.fillRect(0, 0, width, height);

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                if (fireworks[i].dead) fireworks.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update(); p.draw();
                if (p.alpha <= 0.01) particles.splice(i, 1);
            }

            if (particles.length > 2000) particles.splice(0, particles.length - 2000);
            requestAnimationFrame(animate);
        }

        const handleInput = (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            launchBatch(x, y);
        };

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

        animate();
    </script>
</body>
</html>
