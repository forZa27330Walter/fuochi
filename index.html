<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Fireworks PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#010206">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010206; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #signature {
            position: absolute; bottom: 15px; left: 15px;
            font-family: 'Arial', sans-serif; font-size: 11px; font-weight: bold;
            color: #ff8c00; text-decoration: none; opacity: 0.3; z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <a id="signature" href="mailto:allsatone@gmail.com">@Walter</a>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
            });
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function playLaunchSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(40, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(1.5, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function playExplosionSound(intensity) {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(250 * intensity, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 2.5);
            gain.gain.setValueAtTime(intensity * 1.5, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        class Particle {
            constructor(x, y, color, vel, friction, gravity, size, lifeMult) {
                this.x = x; this.y = y; this.color = color;
                this.vel = vel; this.alpha = 1;
                this.decay = (0.0015 + Math.random() * 0.003) / lifeMult; 
                this.friction = friction; this.gravity = gravity; this.size = size;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                // Ripristinato bagliore solo per particelle grandi/vicine
                if (this.size > 0.4) {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = this.color;
                }
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill(); 
                ctx.restore();
            }
            update() {
                this.vel.x *= this.friction; this.vel.y *= this.friction;
                this.vel.y += this.gravity;
                this.x += this.vel.x; this.y += this.vel.y;
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor(tx, ty, type, depthScale) {
                this.depthScale = depthScale;
                this.x = width / 2 + (Math.random() - 0.5) * (width * 0.6);
                this.y = height;
                this.tx = tx; this.ty = Math.max(ty, height * 0.15);
                const colors = ['#ffffff', '#ffd700', '#ff1493', '#00ff7f', '#00bfff', '#ff4500', '#fffae6'];
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.atan2(this.ty - height, this.tx - this.x);
                this.v = { x: Math.cos(angle) * (9 * depthScale), y: Math.sin(angle) * (9 * depthScale) };
                this.dead = false; this.particles = [];
                this.type = type;
                playLaunchSound();
            }
            update() {
                this.x += this.v.x; this.y += this.v.y;
                ctx.fillStyle = this.colorBase;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1 * this.depthScale, 0, Math.PI*2); ctx.fill();
                if (this.v.y >= -0.3 || this.y <= this.ty) { this.explode(); this.dead = true; }
                this.v.y += 0.08 * this.depthScale; 
            }
            explode() {
                const count = 140 + Math.random() * 60;
                playExplosionSound(1.4);
                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = (Math.random() * 3.8 + 0.5) * this.depthScale;
                    let friction = 0.965; let gravity = 0.04 * this.depthScale; let lifeMult = 1.3;
                    let color = this.colorBase;
                    
                    if(this.type === 0) { color = '#ffcc00'; lifeMult = 2.5; gravity *= 0.5; } // Brocade
                    else if(this.type === 3) { gravity = 0.09 * this.depthScale; friction = 0.98; } // Willow

                    this.particles.push(new Particle(this.x, this.y, color, {x: Math.cos(angle) * speed, y: Math.sin(angle) * speed}, friction, gravity, 0.7 * this.depthScale, lifeMult));
                }
            }
        }

        let fireworks = [];
        let particles = [];

        function launchBatch(ex, ey) {
            const depthScale = 0.7 + Math.random() * 0.5;
            const type = Math.floor(Math.random() * 6);
            const count = Math.floor(Math.random() * 3) + 1;

            for(let i=0; i < count; i++) {
                setTimeout(() => {
                    fireworks.push(new Firework(ex + (Math.random()-0.5)*200, ey + (Math.random()-0.5)*120, type, depthScale));
                }, i * 300);
            }
        }

        function animate() {
            // Scia più persistente per visibilità maggiore
            ctx.fillStyle = 'rgba(1, 2, 6, 0.18)';
            ctx.fillRect(0, 0, width, height);

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                if (fireworks[i].dead) {
                    particles.push(...fireworks[i].particles);
                    fireworks.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0.01) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        const handleInput = (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            launchBatch(x, y);
        };

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

        animate();
    </script>
</body>
</html>
