        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010206; touch-action: none; }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; background: transparent; }
        
        /* Contenitore Testo Background */

            position: absolute;

<body>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function playLaunchSound() {
            if (audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(45, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        function playExplosionSound(intensity) {
            if (audioCtx.state === 'suspended') return;
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(250 * intensity, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 2.5);
            gain.gain.setValueAtTime(intensity * 0.7, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        class Particle {
            constructor(x, y, color, vel, friction, gravity, size, lifeMult, isLaunch = false) {
                this.x = x; this.y = y; this.color = color;
                this.vel = vel; this.alpha = 1;
                this.friction = friction; this.gravity = gravity;
                this.size = size;
                this.isLaunch = isLaunch;
                this.decay = (isLaunch ? 0.08 : 0.005 + Math.random() * 0.008) / lifeMult;
            }
            draw() {
                if (this.alpha < 0.05) return; 
                ctx.save();
                ctx.globalAlpha = Math.min(1, Math.max(0, this.alpha)); 
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, 7);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.vel.x *= this.friction; this.vel.y *= this.friction;
                this.vel.y += this.gravity;
                this.x += this.vel.x; this.y += this.vel.y;
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor(tx, ty, type, depthScale) {
                this.depthScale = depthScale;
                this.x = width / 2 + (Math.random() - 0.5) * (width * 0.6);
                this.y = height;
                this.tx = tx; this.ty = Math.max(ty, height * 0.15);
                this.type = type;
                this.colorLaunch = '#F5F5F0';
                const colors = ['#FFD700', '#FF1493', '#00FF00', '#00BFFF', '#FF4500', '#FF0000', '#EA00FF', '#00FFFF'];
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.atan2(this.ty - height, this.tx - this.x);
                this.v = { x: Math.cos(angle) * (8 * depthScale), y: Math.sin(angle) * (8 * depthScale) };
                this.dead = false;
                playLaunchSound();
            }
            update() {
                this.x += this.v.x; this.y += this.v.y;
                this.v.y += 0.06 * this.depthScale;
                ctx.globalAlpha = 1;
                ctx.fillStyle = this.colorLaunch;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.1 * this.depthScale, 0, 7);
                ctx.fill();
                if (Math.random() > 0.9) {
                    particles.push(new Particle(this.x, this.y, this.colorLaunch, {x:0,y:0}, 0.98, 0.01, 0.4, 0.5, true));
                }
                if (this.v.y >= -0.1 || this.y <= this.ty) {
                    this.explode();
                    this.dead = true;
                }
            }
            explode() {
                playExplosionSound(1.4);
                let count = 110;
                let friction = 0.95, gravity = 0.05, lifeMult = 1.0;
                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = (Math.random() * 4 + 1) * this.depthScale;
                    let pColor = this.colorBase;
                    switch(this.type) {
                        case 0: pColor = '#FFD700'; lifeMult = 2; gravity = 0.02; break;
                        case 1: if (i % 2 === 0) { angle = (i/count)*Math.PI*2; speed = 5; } break;
                        case 2: speed = i % 4 === 0 ? 6 : 2; break;
                        case 3: angle = Math.PI + (Math.random()-0.5); gravity = 0.09; break;
                        case 4: pColor = i % 2 === 0 ? '#ff0000' : '#ffffff'; break;
                        case 5: speed = Math.random() * 8; friction = 0.9; break;
                        case 6: lifeMult = 0.5; speed *= 1.5; break;
                        case 7: pColor = '#00FF00'; gravity = 0.01; friction = 0.98; break;
                        case 8: angle = (i/count)*Math.PI*2; speed = (i % 10 === 0) ? 7 : 1; break;
                        case 9: pColor = '#00BFFF'; lifeMult = 3; gravity = 0.03; break;
                    }
                    particles.push(new Particle(this.x, this.y, pColor, {
                        x: Math.cos(angle) * speed, y: Math.sin(angle) * speed
                    }, friction, gravity, 0.8 * this.depthScale, lifeMult));
                }
            }
        }

        let particles = [];
        let fireworks = [];

        function animate() {
            // Effetto dissolvenza code senza sovrascrivere lo sfondo HTML
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'source-over';

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                if (fireworks[i].dead) fireworks.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha < 0.02) particles.splice(i, 1);
            }

            if (particles.length > 2000) particles.splice(0, particles.length - 2000);
            requestAnimationFrame(animate);
        }

        const handle = (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            fireworks.push(new Firework(x, y, Math.floor(Math.random() * 10), 0.7 + Math.random() * 0.5));
        };

        window.addEventListener('mousedown', handle);
        window.addEventListener('touchstart', (e) => { 
            if (e.target.tagName !== 'A') e.preventDefault(); 
            handle(e); 
        }, {passive: false});
        
        animate();
    </script>
</body>
